name: Rotate weekly password

on:
  schedule:
    # Every Monday at 06:00 UTC (~09:00 Athens time)
    - cron: '0 6 * * 1'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  rotate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run rotation script
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          PASSWORD_RECIPIENT_EMAILS: ${{ secrets.PASSWORD_RECIPIENT_EMAILS }}
        run: python scripts/rotate_password.py

      - name: Commit and push updated auth-config.js
        run: |
          git config user.name "CLC SAT Quiz Bot"
          git config user.email "actions@users.noreply.github.com"
          git add auth-config.js
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Weekly password rotation"
          git push
